services:
  mysql:
    image: mysql:8.0
    container_name: web3proof-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-web3proof}
      MYSQL_USER: ${MYSQL_USER:-web3proof}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: web3proof-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: web3proof-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-web3proof}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: web3proof-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      AUTH_DOMAIN: ${AUTH_DOMAIN:-localhost}
      AUTH_URI: ${AUTH_URI:-http://localhost}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DRIVER: mysql
      DB_USER: ${MYSQL_USER:-web3proof}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-web3proof}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PINATA_JWT: ${PINATA_JWT}
      STORAGE_ROOT: /app/storage
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-/storage}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      CHAIN_ID: ${CHAIN_ID:-11155111}
      BACKEND_WALLET_PRIVATE_KEY: ${BACKEND_WALLET_PRIVATE_KEY}
      ADMIN_WALLET_ADDRESS: ${ADMIN_WALLET_ADDRESS}
      DID_PROFILE_ADDRESS: ${DID_PROFILE_ADDRESS}
      EVIDENCE_REGISTRY_ADDRESS: ${EVIDENCE_REGISTRY_ADDRESS}
      CREDENTIAL_SBT_ADDRESS: ${CREDENTIAL_SBT_ADDRESS}
      REPUTATION_ADDRESS: ${REPUTATION_ADDRESS}
    ports:
      - "8080:8080"
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api/v1}
        VITE_CHAIN_ID: ${VITE_CHAIN_ID:-11155111}
        VITE_DID_PROFILE_ADDRESS: ${DID_PROFILE_ADDRESS}
        VITE_EVIDENCE_REGISTRY_ADDRESS: ${EVIDENCE_REGISTRY_ADDRESS}
        VITE_CREDENTIAL_SBT_ADDRESS: ${CREDENTIAL_SBT_ADDRESS}
        VITE_REPUTATION_ADDRESS: ${REPUTATION_ADDRESS}
    container_name: web3proof-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.25-alpine
    container_name: web3proof-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro   # HTTPS 证书目录（生产环境启用）

volumes:
  mysql_data:
  redis_data:
  minio_data:
  backend_storage:
